datapulse:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'postgres') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'datapulse') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'datapulse_dev') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'datapulse') }}"
      schema: public
      threads: 4
