version: 2

models:
  - name: dim_date
    description: "Calendar dimension (2023-2025). Egypt weekend = Friday & Saturday."
    columns:
      - name: date_key
        description: "YYYYMMDD integer key"
        tests:
          - unique
          - not_null
      - name: full_date
        tests:
          - not_null
      - name: is_weekend
        description: "True for Friday (5) and Saturday (6)"

  - name: dim_customer
    description: "Customer dimension (customer_id + name)"
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_product
    description: "Product dimension from drug_code. Includes buyer."
    columns:
      - name: product_key
        tests:
          - unique
          - not_null
      - name: drug_code
        tests:
          - unique
          - not_null
      - name: drug_status
        tests:
          - accepted_values:
              values: ['Active', 'Cancelled', 'Delisted', 'New', 'Unknown']

  - name: dim_site
    description: "Site/location dimension. Includes area_manager."
    columns:
      - name: site_key
        tests:
          - unique
          - not_null
      - name: site_code
        tests:
          - unique
          - not_null

  - name: dim_staff
    description: "Staff/personnel dimension (staff_id + name + position)"
    columns:
      - name: staff_key
        tests:
          - unique
          - not_null
      - name: staff_id
        tests:
          - unique
          - not_null

  - name: fct_sales
    description: "Sales fact table (grain: one line-item per invoice)"
    columns:
      - name: sales_key
        tests:
          - unique
          - not_null
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: product_key
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: customer_key
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: site_key
        tests:
          - relationships:
              to: ref('dim_site')
              field: site_key
      - name: quantity
        tests:
          - not_null
      - name: net_amount
        tests:
          - not_null
