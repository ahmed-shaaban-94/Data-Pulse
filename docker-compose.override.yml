# Dev overrides — automatically merged by `docker compose up`
# Production base: docker-compose.yml
# To run prod only: docker compose -f docker-compose.yml up
services:
  app:
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./dbt:/app/dbt
      - ./migrations:/app/migrations

  api:
    volumes:
      - ./src:/app/src
      - ./dbt:/app/dbt
      - ./data:/app/data
      - ./migrations:/app/migrations

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - NODE_OPTIONS=--max-old-space-size=1536
    deploy:
      resources:
        limits:
          memory: 2G
